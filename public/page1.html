<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page 1 - DataTable Đơn giản</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- DataTables CSS -->
    <link href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <a href="index.html" class="btn btn-secondary mb-3">&larr; Quay lại Trang chủ</a>
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4>📄 Page 1 - DataTable Đơn giản (Không cấu hình)</h4>
            </div>
            <div class="card-body">
                <table id="myTable" class="table table-striped table-bordered" style="width:100%">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Class</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <!-- Data sẽ được insert tạm qua js để render do không dùng ajax ở page1 -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- Bootstrap Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- DataTables JS -->
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
    
    <script>
        $(document).ready(function() {
            // Lấy dữ liệu 150 rows và nhúng vào DOM cho Page1 
            //(chỉ để setup data tĩnh cho ví dụ 1, thực tế sẽ render từ HTML backend)
            $.get('/api/users', function(res) {
                let rows = '';
                res.data.forEach(user => {
                    rows += `<tr>
                                <td>${user.id}</td>
                                <td>${user.name}</td>
                                <td>${user.email}</td>
                                <td>${user.phone}</td>
                                <td>${user.class}</td>
                             </tr>`;
                });
                $('#table-body').html(rows);

                // Khởi tạo Datatable đơn giản (khi content html đã sẵn sàng)
                $('#myTable').DataTable();
            });
        });
    </script>
</body>
</html>
